[mypy]
python_version = 3.12
ignore_missing_imports = True
# Keep the initial gate narrow: Pydantic schemas and core helpers have the
# strongest annotations, so we enforce types there first. Everything else
# remains opt-in until we backfill annotations.
files = app/schemas, app/core
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
check_untyped_defs = True
strict_optional = True
disallow_untyped_defs = False
plugins = pydantic.mypy

[pydantic-mypy]
init_typed = True
warn_required_dynamic_aliases = True

[mypy-supabase.*]
ignore_errors = True

[mypy-bleach.*]
ignore_errors = True

[mypy]
python_version = 3.12
ignore_missing_imports = True
# Keep the initial gate narrow: schemas, core, and middleware are fully
# annotated and SQLAlchemy-free, so we enforce types there first. Expanding to
# api/services requires migrating models to SQLAlchemy 2.x `Mapped[...]` style
# first (177 Column[...] errors otherwise) — tracked separately.
files = app/schemas, app/core, app/middleware
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
check_untyped_defs = True
strict_optional = True
disallow_untyped_defs = False
plugins = pydantic.mypy

[pydantic-mypy]
init_typed = True
warn_required_dynamic_aliases = True

[mypy-supabase.*]
ignore_errors = True

[mypy-bleach.*]
ignore_errors = True

name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We love hearing ideas from fellow ministries, teachers, and
        developers! Please describe what you'd like and why it matters.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: |
        What problem does this solve? What use case does it enable?
        Connect it to the experience of a teacher, student, or admin.
      placeholder: As a teacher with 30 students, I need to bulk-grade essays because doing them one by one takes hours.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work (UI mockups welcome).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Courses / content authoring
        - Quizzes / assessments
        - Assignments / grading
        - Enrollment / progress
        - Teacher tools
        - Admin tools
        - Student experience
        - UI / design
        - API / backend
        - Infrastructure / CI
        - Other
    validations:
      required: true

  - type: dropdown
    id: willing
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes, I can submit a PR"
        - "I can help test / review"
        - "No, just suggesting"
    validations:
      required: false

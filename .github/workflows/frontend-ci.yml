name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']
  pull_request:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend-ci.yml']

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: ${{ vars.CI_VITE_API_URL || 'https://example.invalid' }}
      VITE_SUPABASE_URL: ${{ vars.CI_VITE_SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.CI_VITE_SUPABASE_ANON_KEY || 'ci-placeholder-not-real' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (zero warnings)
        run: npx eslint . --ext ts,tsx --report-unused-disable-directives --max-warnings 0

      - name: Typecheck with TypeScript (strict)
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Run unit tests
        run: npm run test:run
